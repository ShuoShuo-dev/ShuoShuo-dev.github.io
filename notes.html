  <!-- 主内容 -->
  <div class="vp-content-wrapper">
    <div class="vp-content">
      <main class="notes-page">

        <div class="page-header">
          <h1>📚 学习笔记</h1>
          <p>记录我的技术学习历程和心得体会</p>
        </div>

        <!-- 分类筛选 -->
        <div class="category-filter">
          <button class="cat-btn active" data-category="all">全部</button>
          <button class="cat-btn" data-category="html">HTML5</button>
          <button class="cat-btn" data-category="css">CSS3</button>
          <button class="cat-btn" data-category="javascript">JavaScript</button>
          <button class="cat-btn" data-category="java">Java</button>
        </div>

        <!-- 搜索结果提示 -->
        <div id="searchTip" style="display:none;margin-bottom:16px;font-size:14px;color:var(--c-text-2)"></div>

        <!-- 笔记网格 -->
        <div class="notes-grid" id="notes-grid"></div>

      </main>
    </div>
  </div>
</div>

<script>
let allNotes = [];

// URL 参数解析
const urlParams = new URLSearchParams(location.search);
const initCat = urlParams.get('cat') || 'all';

// 搜索快捷键
document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
});

// 侧边栏
function toggleGroup(id) { document.getElementById(id).classList.toggle('collapsed'); }
document.getElementById('menuBtn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebarOverlay').classList.toggle('active');
});
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebarOverlay').classList.remove('active');
}

function toggleTheme() {
  const icon = document.getElementById('themeIcon');
  const text = document.getElementById('themeText');
  if (icon.textContent === '🌙') { icon.textContent = '☀️'; text.textContent = 'Dark'; }
  else { icon.textContent = '🌙'; text.textContent = 'Auto'; }
}

// 加载笔记
async function loadNotes() {
  try {
    const resp = await fetch('notes/notes.json');
    allNotes = await resp.json();
  } catch { allNotes = []; }
  renderNotes(initCat);
  setActiveBtn(initCat);
}

function renderNotes(category, keyword = '') {
  const grid = document.getElementById('notes-grid');
  let notes = category === 'all' ? allNotes : allNotes.filter(n => n.category === category);
  if (keyword) notes = notes.filter(n =>
    n.title.toLowerCase().includes(keyword) ||
    (n.intro || '').toLowerCase().includes(keyword)
  );

  if (!notes.length) {
    grid.innerHTML = `
      <div class="empty-notes">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
        </svg>
        <p>${keyword ? '未找到相关笔记' : '该分类下还没有笔记'}</p>
        <p style="font-size:13px;margin-top:6px;">敬请期待...</p>
      </div>`;
    return;
  }

  grid.innerHTML = notes.map(note => {
    const tags = note.tags ? note.tags.split(',').map(t => t.trim()).filter(Boolean) : [];
    const tagsHtml = tags.map(t => `<span class="tag">${t}</span>`).join('');
    const excerpt = note.intro || (note.content ? note.content.substring(0, 100) + '...' : '暂无简介');
    return `
      <article class="note-card" data-category="${note.category || 'other'}">
        <span class="category-tag">${(note.category || 'NOTE').toUpperCase()}</span>
        <h3><a href="notes/${note.filename}">${note.title}</a></h3>
        <p class="date">📅 ${note.date}</p>
        <p class="excerpt">${excerpt}</p>
        <div class="tags">${tagsHtml}</div>
      </article>`;
  }).join('');
}

function setActiveBtn(cat) {
  document.querySelectorAll('.cat-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.category === cat);
  });
}

// 分类筛选
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    setActiveBtn(this.dataset.category);
    renderNotes(this.dataset.category, document.getElementById('searchInput').value.trim().toLowerCase());
  });
});

// 实时搜索
document.getElementById('searchInput').addEventListener('input', function() {
  const kw = this.value.trim().toLowerCase();
  const cat = document.querySelector('.cat-btn.active')?.dataset.category || 'all';
  const tip = document.getElementById('searchTip');
  if (kw) { tip.style.display = 'block'; tip.textContent = `搜索 "${this.value.trim()}" 的结果`; }
  else { tip.style.display = 'none'; }
  renderNotes(cat, kw);
});

loadNotes();
</script>
</body>
